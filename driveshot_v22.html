                                        <button onClick={() => { 
                                            setTemplates([...templates, { id: Date.now(), name: `현장 양식 ${templates.length + 1}`, fields: JSON.parse(JSON.stringify(fields)), scale: boardScale, pos: boardPos }]); 
                                            setToastMsg("새 양식이 저장되었습니다!"); 
                                            setShowToast(true); 
                                            setTimeout(() => setShowToast(false), 2000); 
                                        }} className="w-full py-5 bg-[#2D2D2D] text-[#FFD700] rounded-2xl font-black text-lg mb-6 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 shadow-inner"><i className="fa-solid fa-plus text-xl"></i> 현재 설정을 새 양식으로 저장</button>
                                        
                                        <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-10">
                                            {templates.map(t => (
                                                <div key={t.id} className="template-item group" onClick={() => loadTemplate(t)}>
                                                    <div className="flex items-center justify-between w-full">
                                                        <div className="flex flex-col text-left">
                                                            <div className="flex items-center gap-2">
                                                                <p className="font-black text-slate-800 text-lg leading-tight">{t.name}</p>
                                                                <i className="fa-solid fa-pen text-slate-300 text-xs cursor-pointer hover:text-indigo-500" onClick={(e) => { e.stopPropagation(); const n = prompt("양식 이름 수정:", t.name); if(n) setTemplates(templates.map(tmp => tmp.id === t.id ? {...tmp, name:n}:tmp)); }}></i>
                                                            </div>
                                                            <p className="text-[10px] text-slate-400 uppercase font-bold tracking-tight mt-1 opacity-70 italic text-left">배율 {Math.round(t.scale*100)}% · {t.pos.replace('pos-', '').toUpperCase()} 위치</p>
                                                        </div>
                                                    </div>
                                                    <div className="template-actions" onClick={e => e.stopPropagation()}>
                                                        <button onClick={(e) => { 
                                                            e.stopPropagation(); 
                                                            setTemplates(templates.map(tmp => tmp.id === t.id ? { ...tmp, fields: JSON.parse(JSON.stringify(fields)), scale: boardScale, pos: boardPos } : tmp)); 
                                                            setToastMsg("업데이트 완료!"); 
                                                            setShowToast(true); 
                                                            setTimeout(() => setShowToast(false), 2000); 
                                                        }} className="btn-t-action btn-t-update"><i className="fa-solid fa-arrows-rotate"></i> 업데이트</button>
                                                        <button onClick={(e) => { e.stopPropagation(); setTemplates(templates.filter(tmp => tmp.id !== t.id)); }} className="btn-t-action btn-t-delete"><i className="fa-solid fa-trash-can"></i> 삭제</button>
                                                        <button onClick={(e) => { e.stopPropagation(); setActiveTemplate(t); setShowQR(true); }} className="btn-t-action btn-t-qr shadow-inner bg-slate-50 text-slate-400"><i className="fa-solid fa-qrcode"></i> QR공유</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* 도움말 모달 - 초보자용 사용법 */}
                    {showHelp && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowHelp(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-top duration-300 max-w-[340px]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold text-slate-800">📖 사용 방법</h3>
                                    <button onClick={() => setShowHelp(false)} className="text-slate-400 p-2"><i className="fa-solid fa-xmark text-2xl"></i></button>
                                </div>
                                <div className="text-left text-sm text-slate-600 space-y-4">
                                    <div><strong className="text-slate-800">1. 사진 불러오기</strong><br/>작업 영역을 클릭하거나 Load 버튼 → 갤러리/카메라에서 선택</div>
                                    <div><strong className="text-slate-800">2. 보드판 편집</strong><br/>공사명, 공종 등 클릭해서 수정 · +/-로 크기 조절</div>
                                    <div><strong className="text-slate-800">3. 적용 버튼</strong><br/>사진+보드판을 하나로 합쳐서 브라우저에 저장</div>
                                    <div><strong className="text-slate-800">4. 구글 드라이브</strong><br/>Sync → 다운로드 → Drive에 업로드 페이지에서 파일 올리기</div>
                                </div>
                                <button onClick={() => setShowHelp(false)} className="mt-6 w-full py-4 bg-[#2D2D2D] text-[#FFD700] rounded-2xl font-bold">확인</button>
                            </div>
                        </div>
                    )}

                    {/* 저장된 이미지 갤러리 - 다운로드 & 구글 드라이브 업로드 준비 */}
                    {showSavedGallery && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowSavedGallery(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-top duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6 px-1">
                                    <h3 className="text-2xl font-bold text-slate-800 tracking-tight italic uppercase">저장된 합성 이미지</h3>
                                    <button onClick={() => setShowSavedGallery(false)} className="text-slate-400 p-2 active:scale-90 transition-transform"><i className="fa-solid fa-xmark text-3xl"></i></button>
                                </div>
                                <p className="text-sm text-slate-500 mb-4">Drive 업로드 버튼을 누르면 자동으로 [드라이브샷] 폴더에 저장됩니다.</p>
                                {savedImages.length > 0 && (
                                    <button 
                                        onClick={handleUploadAll}
                                        disabled={isUploading}
                                        className="w-full py-3 mb-4 rounded-2xl font-black text-white flex items-center justify-center gap-2"
                                        style={{background: isUploading ? '#94a3b8' : '#4285F4'}}
                                    >
                                        {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> {uploadProgress}</> : <><i className="fa-brands fa-google-drive"></i> 전체 일괄 업로드 ({savedImages.length}장)</>}
                                    </button>
                                )}
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-10 max-h-[60vh]">
                                    {savedImages.length === 0 ? (
                                        <div className="text-center py-12 text-slate-400">
                                            <i className="fa-solid fa-images text-5xl mb-4 opacity-50"></i>
                                            <p className="font-bold">저장된 이미지가 없습니다.</p>
                                            <p className="text-xs mt-2">사진을 불러온 뒤 [적용] 버튼을 누르세요.</p>
                                        </div>
                                    ) : (
                                        savedImages.map(item => (
                                            <div key={item.id} className="bg-slate-50 rounded-2xl p-4 border border-slate-100 flex gap-4 items-center">
                                                <img src={URL.createObjectURL(item.blob)} alt="" className="w-20 h-20 object-cover rounded-xl" />
                                                <div className="flex-1 min-w-0">
                                                    <p className="font-bold text-slate-800 truncate text-sm">{item.filename}</p>
                                                    <p className="text-[10px] text-slate-400">
                                                        {item.folderName ? `폴더: ${item.folderName}` : '폴더: (미지정)'}
                                                    </p>
                                                    <p className="text-[10px] text-slate-400">{new Date(item.createdAt).toLocaleString('ko-KR')}</p>
                                                </div>
                                                <div className="flex flex-col gap-2">
                                                    <button onClick={() => downloadBlob(item.blob, item.filename)} className="btn-t-action btn-t-update text-center py-2"><i className="fa-solid fa-download"></i> 다운로드</button>
                                                    <button 
                                                        onClick={() => handleDriveUpload(item)} 
                                                        disabled={isUploading}
                                                        className="btn-t-action text-center py-2"
                                                        style={{background: isUploading ? '#94a3b8' : '#4285F4', color: 'white'}}
                                                    >
                                                        {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> {uploadProgress}</> : <><i className="fa-brands fa-google-drive"></i> Drive 업로드</>}
                                                    </button>
                                                    <button onClick={async () => { await deleteFromDB(item.id); setSavedImages(await loadAllFromDB()); }} className="btn-t-action btn-t-delete text-center py-2"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 항목 편집 모달 */}
                    {showModal && currentField && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-bottom duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-5 px-1">
                                    <h3 className="text-2xl font-bold text-slate-800 tracking-tight italic uppercase">{currentField.label} Select</h3>
                                    <button onClick={() => setShowModal(false)} className="text-slate-400 p-2 active:scale-90 transition-all"><i className="fa-solid fa-xmark text-3xl"></i></button>
                                </div>
                                <div className="flex flex-col flex-1 overflow-hidden pb-10 text-left">
                                    {currentField.type === 'date' ? (
                                        <div className="space-y-6"><input type="date" className="date-picker-input shadow-inner" value={currentField.value} onChange={(e) => updateFieldValue(activeFieldId, e.target.value)} /></div>
                                    ) : (
                                        <>
                                            <div className="flex gap-2 mb-8">
                                                {currentField.quick.map((v, idx) => (
                                                    <div key={idx} className="flex-1 relative text-center">
                                                        {isEditingQuick === idx ? (
                                                            <input 
                                                                autoFocus
                                                                className="w-full py-6 bg-[#2D2D2D] text-[#FFD700] rounded-2xl text-center text-base font-bold outline-none shadow-lg"
                                                                defaultValue={v}
                                                                onBlur={(e) => saveQuickBtnText(activeFieldId, idx, e.target.value)}
                                                                onKeyDown={(e) => e.key === 'Enter' && saveQuickBtnText(activeFieldId, idx, e.target.value)}
                                                            />
                                                        ) : (
                                                            <button 
                                                                onClick={() => updateFieldValue(activeFieldId, v)} 
                                                                className={`w-full py-6 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xs transition-all ${currentField.value === v ? 'border-[#FF8C00] bg-orange-50 text-[#FF8C00] shadow-md' : 'text-slate-700'}`}
                                                            >
                                                                {v}
                                                                <div className="quick-edit-icon" onClick={(e) => { e.stopPropagation(); setIsEditingQuick(idx); }}>
                                                                    <i className="fa-solid fa-pen"></i>
                                                                </div>
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <p className="text-[13px] font-bold text-slate-400 uppercase mb-3 tracking-widest px-1 italic text-left leading-none">Recent History</p>
                                            <div className="flex-1 overflow-y-auto no-scrollbar space-y-1 mb-6 border-t border-b border-slate-50 py-2">
                                                {currentField.history.map((h, i) => (
                                                    <div key={i} onClick={() => updateFieldValue(activeFieldId, h)} className="p-5 border-b border-slate-50 flex justify-between font-bold text-slate-700 text-xl active:bg-slate-50 transition-colors uppercase tracking-tighter italic text-left"><span>{h}</span><i className="fa-solid fa-rotate-left text-slate-200"></i></div>
                                                ))}
                                            </div>
                                            <input type="text" placeholder="새로운 내용을 입력하세요 (Enter)" className="w-full p-6 bg-slate-50 border-2 border-orange-100 rounded-2xl font-bold outline-none focus:border-[#FF8C00] text-xl shadow-inner transition-all" onKeyDown={(e) => { if(e.key === 'Enter') updateFieldValue(activeFieldId, e.target.value); }} />
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
