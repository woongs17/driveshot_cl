<body>
    <div id="root"></div>
    <script type="text/babel">
        const GOOGLE_CLIENT_ID = '986985952258-hp9bstq1c75d7f1fsuadrmcd0o7fhagj.apps.googleusercontent.com';
        const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

        const getAccessToken = () => new Promise((resolve, reject) => {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID,
                scope: DRIVE_SCOPE,
                callback: (resp) => {
                    if (resp.error) reject(resp);
                    else resolve(resp.access_token);
                }
            });
            tokenClient.requestAccessToken({ prompt: '' });
        });

        const getOrCreateFolder = async (token, folderName, parentId = null) => {
            const q = parentId
                ? `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`
                : `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and 'root' in parents and trashed=false`;
            const searchRes = await fetch(
                `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`,
                { headers: { Authorization: `Bearer ${token}` } }
            );
            const searchData = await searchRes.json();
            if (searchData.files && searchData.files.length > 0) return searchData.files[0].id;

            const meta = { name: folderName, mimeType: 'application/vnd.google-apps.folder' };
            if (parentId) meta.parents = [parentId];
            const createRes = await fetch('https://www.googleapis.com/drive/v3/files', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(meta)
            });
            const createData = await createRes.json();
            return createData.id;
        };

        const uploadToDrive = async (token, blob, filename, folderId) => {
            const metadata = { name: filename, parents: [folderId] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', blob);
            const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink', {
                method: 'POST',
                headers: { Authorization: `Bearer ${token}` },
                body: form
            });
            return await res.json();
        };

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('main'); 
            const [fields, setFields] = useState([
                { id: 1, label: '공사명', value: '수원 골드스테이션 전기 공사 완료 건', type: 'text', color: '#2D2D2D', quick: ['수원 현장', '동탄 파크뷰', '평택 스마트'], history: ['판교 테크노밸리'], nameRole: 'folder' },
                { id: 2, label: '공 종', value: '전기 설비 공사', type: 'text', color: '#2D2D2D', quick: ['전기 공사', '설비 공사', '소방 공사'], history: ['기초 토목'], nameRole: 'file1' },
                { id: 3, label: '위 치', value: '101동 203호 안방', type: 'text', color: '#2D2D2D', quick: ['101동', '지하 1층', '외부 옹벽'], history: ['전기실 내부'], nameRole: 'file2' },
                { id: 4, label: '날 짜', value: new Date().toISOString().split('T')[0], type: 'date', color: '#2D2D2D', quick: [], history: [], nameRole: null },
                { id: 5, label: '내 용', value: '시공 후', type: 'stage', color: '#FF8C00', quick: ['시공 전', '시공 중', '시공 후'], history: [], nameRole: null }
            ]);

            const [images, setImages] = useState([]);
            const [boardScale, setBoardScale] = useState(0.5); 
            const [boardPos, setBoardPos] = useState('pos-bl');
            const [showModal, setShowModal] = useState(false);
            const [showTemplateModal, setShowTemplateModal] = useState(false);
            const [activeFieldId, setActiveFieldId] = useState(null);
            const [showToast, setShowToast] = useState(false);
            const [toastMsg, setToastMsg] = useState("");
            const [isEditMode, setIsEditMode] = useState(false);
            const [user, setUser] = useState(null);
            const [accessToken, setAccessToken] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState('');
            const [selectedFolder, setSelectedFolder] = useState("");
            const [showAddMenu, setShowAddMenu] = useState(false);
            const [storageLoc, setStorageLoc] = useState('mine');
            const [wifiOnly, setWifiOnly] = useState(true);
            const [imageQuality, setImageQuality] = useState('normal');
            const [aspectRatio, setAspectRatio] = useState('4:3');     

            const RESOLUTIONS = {
                'normal': { '1:1': [1300,1300], '4:3': [2000,1500], '16:9': [1920,1080] },
                'high':   { '1:1': [2600,2600], '4:3': [4000,3000], '16:9': [3840,2160] }
            };
            const [showQR, setShowQR] = useState(false);
            const [activeTemplate, setActiveTemplate] = useState(null);
            const [isEditingQuick, setIsEditingQuick] = useState(null);
            const [savedImages, setSavedImages] = useState([]);  
            const [isCapturing, setIsCapturing] = useState(false);  
            const [showSavedGallery, setShowSavedGallery] = useState(false);  
            const [showHelp, setShowHelp] = useState(false);  
            const [roleMenuFieldId, setRoleMenuFieldId] = useState(null);  

            const fileInputRef = useRef(null);
            const cameraInputRef = useRef(null);       
            const captureContainerRef = useRef(null);  
            const labelPressTimerRef = useRef(null);   
            const labelPressTriggeredRef = useRef(false); 
            const [cameraMode, setCameraMode] = useState(false); 
            const [stream, setStream] = useState(null); 
            const videoRef = useRef(null);
            const safeZoneRef = useRef(null); // 세이프가이드 실제 DOM 크기 측정용

            const DB_NAME = 'DriveShootDB';
            const STORE_NAME = 'combinedImages';

            const openDB = () => new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onerror = () => reject(req.error);
                req.onsuccess = () => resolve(req.result);
                req.onupgradeneeded = (e) => { e.target.result.createObjectStore(STORE_NAME, { keyPath: 'id' }); };
            });

            const saveToDB = async (blob, filename, folderName, baseName) => {
                const db = await openDB();
                const item = { id: Date.now(), blob, filename, folderName, baseName, createdAt: new Date().toISOString() };
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).put(item);
                    tx.oncomplete = () => resolve(item.id);
                    tx.onerror = () => reject(tx.error);
                });
            };

            const loadAllFromDB = async () => {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const req = tx.objectStore(STORE_NAME).getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(req.error);
                });
            };

            const deleteFromDB = async (id) => {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    tx.objectStore(STORE_NAME).delete(id);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            };

            const downloadBlob = (blob, filename) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();

            /* ===== 합성 엔진 ===== */
            const captureAndBake = async (outW, outH, photoSrc) => {
                const imgSrc = photoSrc || images[0];
                if (!imgSrc) throw new Error("사진이 없습니다.");

                // 1. 보드판: scale 해제 후 자연 크기 측정 + html2canvas 캡처
                const boardEl = document.querySelector('.overlay-board');
                if (!boardEl) throw new Error("보드판 요소를 찾을 수 없습니다.");
                const originalTransform = boardEl.style.transform;
                boardEl.style.transform = 'none';
                const naturalW = boardEl.offsetWidth;
                const naturalH = boardEl.offsetHeight;
                const boardCanvas = await html2canvas(boardEl, {
                    useCORS: true, allowTaint: true, scale: 3, backgroundColor: null, logging: false
                });
                boardEl.style.transform = originalTransform;

                // 2. 최종 캔버스
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = outW; finalCanvas.height = outH;
                const ctx = finalCanvas.getContext('2d');

                // 3. 배경 이미지 (object-fit: cover)
                const img = new Image();
                img.src = imgSrc;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error("사진을 불러오지 못했습니다."));
                });
                const imgRatio = img.width / img.height;
                const outRatio = outW / outH;
                let sw, sh, sx, sy;
                if (imgRatio > outRatio) { sh = img.height; sw = sh * outRatio; sx = (img.width-sw)/2; sy = 0; }
                else { sw = img.width; sh = sw/outRatio; sx = 0; sy = (img.height-sh)/2; }
                ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);

                // 4. 보드판 출력 크기: 카메라 뷰 세이프가이드와 1:1 매칭
                // safeZone DOM 크기 → 출력 해상도 비율로 그대로 환산
                const safeZoneDom = safeZoneRef.current;
                let finalBoardW, finalBoardH;
                if (safeZoneDom) {
                    // 세이프가이드 실제 DOM 픽셀 크기
                    const szW = safeZoneDom.offsetWidth;
                    const szH = safeZoneDom.offsetHeight;
                    // 세이프가이드 DOM → 출력 해상도 비율
                    const scaleX = outW / szW;
                    const scaleY = outH / szH;
                    // 보드판: scale(boardScale) 적용된 크기 그대로
                    finalBoardW = Math.round(naturalW * boardScale * scaleX);
                    finalBoardH = Math.round(naturalH * boardScale * scaleY);
                } else {
                    // fallback: 출력 짧은 변 기준
                    const refSize = Math.min(outW, outH);
                    const scaleFactor = (refSize / Math.min(naturalW, naturalH)) * boardScale;
                    finalBoardW = Math.round(naturalW * scaleFactor);
                    finalBoardH = Math.round(naturalH * scaleFactor);
                }
                // 짤림 방지
                if (finalBoardW > outW) { finalBoardH = Math.round(finalBoardH * outW / finalBoardW); finalBoardW = outW; }
                if (finalBoardH > outH) { finalBoardW = Math.round(finalBoardW * outH / finalBoardH); finalBoardH = outH; }

                // 5. 위치: 사진 모서리 0여백
                let bx = 0, by = 0;
                if (boardPos.includes('r')) bx = outW - finalBoardW;
                if (boardPos.includes('b')) by = outH - finalBoardH;
                bx = Math.max(0, Math.min(bx, outW - finalBoardW));
                by = Math.max(0, Math.min(by, outH - finalBoardH));

                // 6. 합성
                ctx.drawImage(boardCanvas, 0, 0, boardCanvas.width, boardCanvas.height, bx, by, finalBoardW, finalBoardH);
                return new Promise(resolve => finalCanvas.toBlob(resolve, 'image/jpeg', imageQuality === 'high' ? 0.95 : 0.88));
            };

                            </div>
                            <h3 className="settings-title">이미지 품질 및 해상도</h3>
                            <div className="settings-card-group space-y-2">
                                <div className="switch-row px-2">
                                    <div className="text-left"><p className="font-extrabold text-sm text-slate-800">고화질 (HD)</p><p className="text-[9px] text-slate-400 font-medium">꺼짐: SD ({RESOLUTIONS['normal'][aspectRatio].join('×')}) / 켜짐: HD ({RESOLUTIONS['high'][aspectRatio].join('×')})</p></div>
                                    <label className="toggle-switch"><input type="checkbox" checked={imageQuality === 'high'} onChange={() => setImageQuality(imageQuality === 'high' ? 'normal' : 'high')} /><span className="toggle-slider"></span></label>
                                </div>
                                <div className="border-t border-slate-50 pt-3 px-2">
                                    <p className="font-extrabold text-sm text-slate-800 mb-2">이미지 비율</p>
                                    <div className="flex gap-2">
                                        {[ { ratio:'1:1', w:1, h:1, desc:'정사각형' }, { ratio:'4:3', w:4, h:3, desc:'일반 사진' }, { ratio:'16:9', w:16, h:9, desc:'와이드' } ].map(({ratio, w, h, desc}) => (
                                            <div key={ratio} onClick={() => setAspectRatio(ratio)} style={{ flex:1, border: aspectRatio === ratio ? '2px solid #FF8C00' : '2px solid #e2e8f0', borderRadius:12, padding:'8px 4px', textAlign:'center', cursor:'pointer', background: aspectRatio === ratio ? '#fffbeb' : '#f8fafc' }}>
                                                <p style={{fontSize:10, fontWeight:900, color: aspectRatio === ratio ? '#FF8C00' : '#475569'}}>{ratio}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => setView('main')} className="w-full bg-[#2D2D2D] text-[#FFD700] py-5 rounded-[1.5rem] font-black text-lg active:scale-95 transition-transform shadow-2xl">설정 완료</button>
                        </div>
                    </div>

                    {showToast && (
                        <div className="toast-center animate-in zoom-in duration-300">
                            <div className="flex flex-col items-center gap-4"><div className="w-16 h-16 bg-[#FFD700]/20 rounded-full flex items-center justify-center border border-yellow-500/20 shadow-inner"><i className="fa-solid fa-check text-4xl text-[#FFD700]"></i></div><p className="text-xl font-bold text-white uppercase">{toastMsg}</p></div>
                        </div>
                    )}

                    {showTemplateModal && view === 'main' && (
                        <div className="modal-overlay" onClick={() => { setShowTemplateModal(false); setShowQR(false); }}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-top duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-6 px-1"><h3 className="text-2xl font-bold text-slate-800 tracking-tight italic uppercase tracking-tighter">Photo Template List</h3><button onClick={() => { setShowTemplateModal(false); setShowQR(false); }} className="text-slate-400 p-2 active:scale-90 transition-transform"><i className="fa-solid fa-xmark text-3xl"></i></button></div>
                                <div className="flex flex-col flex-1 overflow-hidden px-1">
                                    <button onClick={() => { setTemplates([...templates, { id: Date.now(), name: `현장 양식 ${templates.length + 1}`, fields: JSON.parse(JSON.stringify(fields)), scale: boardScale, pos: boardPos }]); setToastMsg("새 양식이 저장되었습니다!"); setShowToast(true); setTimeout(() => setShowToast(false), 2000); }} className="w-full py-5 bg-[#2D2D2D] text-[#FFD700] rounded-2xl font-black text-lg mb-6 shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 shadow-inner"><i className="fa-solid fa-plus text-xl"></i> 현재 설정을 새 양식으로 저장</button>
                                    <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-10">
                                        {templates.map(t => (
                                            <div key={t.id} className="template-item group" onClick={() => loadTemplate(t)}>
                                                <div className="flex items-center justify-between w-full"><div className="flex flex-col text-left"><div className="flex items-center gap-2"><p className="font-black text-slate-800 text-lg leading-tight">{t.name}</p></div></div></div>
                                                <div className="template-actions" onClick={e => e.stopPropagation()}><button onClick={(e) => { e.stopPropagation(); setTemplates(templates.filter(tmp => tmp.id !== t.id)); }} className="btn-t-action btn-t-delete"><i className="fa-solid fa-trash-can"></i> 삭제</button></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showHelp && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowHelp(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-top duration-300 max-w-[340px]" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4"><h3 className="text-xl font-bold text-slate-800">📖 사용 방법</h3><button onClick={() => setShowHelp(false)} className="text-slate-400 p-2"><i className="fa-solid fa-xmark text-2xl"></i></button></div>
                                <button onClick={() => setShowHelp(false)} className="mt-6 w-full py-4 bg-[#2D2D2D] text-[#FFD700] rounded-2xl font-bold">확인</button>
                            </div>
                        </div>
                    )}

                    {showSavedGallery && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowSavedGallery(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-top duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4 px-1">
                                    <h3 className="text-2xl font-bold text-slate-800 tracking-tight italic uppercase">저장된 합성 이미지</h3>
                                    <button onClick={() => setShowSavedGallery(false)} className="text-slate-400 p-2 active:scale-90 transition-transform"><i className="fa-solid fa-xmark text-3xl"></i></button>
                                </div>
                                {savedImages.length > 0 && (
                                    <button onClick={handleUploadAll} disabled={isUploading} className="w-full py-3 mb-4 rounded-2xl font-black text-white flex items-center justify-center gap-2" style={{background: isUploading ? '#94a3b8' : '#4285F4'}}>
                                        {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> {uploadProgress}</> : <><i className="fa-brands fa-google-drive"></i> 전체 일괄 업로드 ({savedImages.length}장)</>}
                                    </button>
                                )}
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-10 max-h-[65vh]">
                                    {savedImages.map(item => (
                                        <div key={item.id} className="bg-slate-50 rounded-2xl p-3 border border-slate-100">
                                            {/* 미리보기 이미지 - 가로 전체 크게 */}
                                            <img src={URL.createObjectURL(item.blob)} alt="" style={{width:'100%', height:'auto', maxHeight:220, objectFit:'cover', borderRadius:12, marginBottom:10, display:'block'}} />
                                            {/* 파일명 */}
                                            <p style={{fontSize:10, fontWeight:700, color:'#475569', marginBottom:8, paddingLeft:2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{item.filename}</p>
                                            {/* 버튼 2개: 다운로드 + 개별업로드 */}
                                            <div className="flex gap-2">
                                                <button onClick={() => downloadBlob(item.blob, item.filename)}
                                                    className="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl font-black text-sm"
                                                    style={{background:'#f1f5f9', color:'#475569', border:'1.5px solid #e2e8f0'}}>
                                                    <i className="fa-solid fa-download text-xs"></i> 다운로드
                                                </button>
                                                <button onClick={() => handleDriveUpload(item)} disabled={isUploading}
                                                    className="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl font-black text-sm"
                                                    style={{background: isUploading ? '#94a3b8' : '#4285F4', color:'#fff', border:'none'}}>
                                                    <i className="fa-brands fa-google-drive text-xs"></i> 업로드
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {showModal && currentField && view === 'main' && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal-content shadow-2xl animate-in slide-in-from-bottom duration-300" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-5 px-1"><h3 className="text-2xl font-bold text-slate-800 tracking-tight italic uppercase">{currentField.label} Select</h3><button onClick={() => setShowModal(false)} className="text-slate-400 p-2 active:scale-90 transition-all"><i className="fa-solid fa-xmark text-3xl"></i></button></div>
                                <div className="flex flex-col flex-1 overflow-hidden pb-10 text-left">
                                    {currentField.type === 'date' ? (
                                        <div className="space-y-6"><input type="date" className="date-picker-input shadow-inner" value={currentField.value} onChange={(e) => updateFieldValue(activeFieldId, e.target.value)} /></div>
                                    ) : (
                                        <>
                                            <div className="flex gap-2 mb-8">
                                                {currentField.quick.map((v, idx) => (
                                                    <div key={idx} className="flex-1 relative text-center"><button onClick={() => updateFieldValue(activeFieldId, v)} className={`w-full py-6 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-xs transition-all ${currentField.value === v ? 'border-[#FF8C00] bg-orange-50 text-[#FF8C00] shadow-md' : 'text-slate-700'}`}>{v}</button></div>
                                                ))}
                                            </div>
                                            <input type="text" placeholder="새로운 내용을 입력하세요 (Enter)" className="w-full p-6 bg-slate-50 border-2 border-orange-100 rounded-2xl font-bold outline-none focus:border-[#FF8C00] text-xl shadow-inner transition-all" onKeyDown={(e) => { if(e.key === 'Enter') updateFieldValue(activeFieldId, e.target.value); }} />
                                        </>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
