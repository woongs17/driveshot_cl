<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style id="camera-rotate-style"></style>
    <title>드라이브 슛 - 디월트 테마 최종 통합 마스터 (가이드라인 및 비율 100% 완벽 일치)</title>
    <!-- 외부 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 구글 API -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <!-- 이미지 합성용 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --gunmetal: #2D2D2D;
            --orange: #FF8C00;
            --yellow: #FFD700;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .mobile-frame { 
            width: 375px; height: 812px; background-color: #000; border-radius: 44px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            border: 8px solid #334155; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); 
        }
        .notch { 
            position: absolute; top: 0; left: 50%; transform: translateX(-50%); 
            width: 150px; height: 32px; background-color: #334155; 
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 250; 
        }

        /* 보드판 편집기 */
        .board-editor { 
            background-color: #ffffff; 
            border: 3px solid var(--gunmetal); border-radius: 12px; margin: 0 10px; 
            overflow-x: hidden; z-index: 50; flex-shrink: 0;
            display: flex; flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 280px; overflow-y: auto;
        }
        .board-editor::-webkit-scrollbar { width: 6px; }
        .board-editor::-webkit-scrollbar-thumb { background: var(--gunmetal); border-radius: 10px; border: 1px solid #ffffff; }

        .stamp-row { display: flex; border-bottom: 1px solid #f1f5f9; min-height: 56px; align-items: stretch; position: relative; }
        .stamp-row:last-child { border-bottom: none; }
        
        .stamp-label { 
            width: 80px; background-color: var(--gunmetal); color: var(--yellow); 
            font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; position: relative;
        }
        .stamp-label.role-folder { background-color: #dc2626; color: #fff; }
        .stamp-label.role-file1  { background-color: #2563eb; color: #fff; }
        .stamp-label.role-file2  { background-color: #16a34a; color: #fff; }
        .role-badge {
            position: absolute; bottom: 2px; left: 0; right: 0;
            text-align: center; font-size: 8px; font-weight: 900;
            opacity: 0.85; letter-spacing: 0.05em;
        }
        .stamp-value { 
            flex: 1; padding: 0 12px; color: #111827; font-weight: 700; font-size: 15px; 
            display: flex; align-items: center; justify-content: flex-start; background: white;
            cursor: pointer; white-space: nowrap; overflow-x: auto;
        }

        .action-group { display: flex; align-items: stretch; }
        .rotate-trigger { width: 38px; display: flex; align-items: center; justify-content: center; background-color: #f5f3ff; color: #7C4DFF; cursor: pointer; border-left: 1px solid #ddd6fe; }
        .del-btn { width: 34px; display: flex; align-items: center; justify-content: center; background-color: #fff1f2; color: #f43f5e; cursor: pointer; border-left: 1px solid #ffe4e6; }
        .reorder-btns { display: flex; flex-direction: column; width: 32px; border-left: 1px solid #f1f5f9; background: #fafafa; }
        .reorder-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #cbd5e1; cursor: pointer; }

        /* 스마트 툴바 */
        .smart-toolbar {
            display: flex; align-items: center;
            margin: 8px 10px 0; padding: 6px 8px; background: rgba(45, 45, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; z-index: 100; flex-shrink: 0;
            gap: 5px; height: 58px; position: relative;
        }
        .btn-action { height: 42px; padding: 0 10px; border-radius: 10px; font-weight: 800; font-size: 11px; transition: all 0.2s; display: flex; align-items: center; gap: 4px; shrink: 0; }
        .btn-template { background-color: var(--gunmetal); color: var(--yellow); }
        .btn-edit { background-color: #475569; color: white; }
        .btn-edit.active { background-color: var(--orange); }

        .scale-save-group {
            display: flex; align-items: center; background: rgba(0,0,0,0.5); border-radius: 12px;
            padding: 2px; flex: 1; min-width: 150px; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1);
        }
        .scale-btn { width: 34px; height: 38px; display: flex; align-items: center; justify-content: center; color: white; border-radius: 10px; transition: all 0.1s; font-size: 16px; }
        .scale-value-box { background: white; color: var(--gunmetal); padding: 2px 6px; border-radius: 8px; font-weight: 800; font-size: 12px; min-width: 42px; text-align: center; border: 1.5px solid var(--yellow); }
        .btn-inline-save { background-color: var(--orange); color: white; padding: 0 8px; height: 38px; border-radius: 10px; font-weight: 900; font-size: 10px; display: flex; align-items: center; gap: 3px; shrink: 0; margin-left: 2px; }

        .pos-square {
            position: absolute; width: 50px; height: 50px; border: 3.5px solid var(--yellow);
            border-radius: 14px; pointer-events: auto; display: flex; align-items: center; justify-content: center;
            color: var(--yellow); font-size: 13px; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 70;
            animation: marker-boing 1.5s ease-in-out infinite;
        }

        /* 갤러리 영역 크기 붕괴 100% 방지 로직 적용 */
        .workspace-area {
            flex: 1; margin: 15px 0 0; border: none; border-radius: 0;
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            background-color: #111827; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 45%; min-height: 0;
        }

        .overlay-board {
            position: absolute; width: auto; background: #ffffff; border: 1.5px solid #000000; padding: 0; pointer-events: none; z-index: 60;
        }

        .overlay-board.pos-tl { top: 0px !important; left: 0px !important; transform-origin: top left; }
        .overlay-board.pos-tr { top: 0px !important; right: 0px !important; transform-origin: top right; }
        .overlay-board.pos-bl { bottom: 0px !important; left: 0px !important; transform-origin: bottom left; }
        .overlay-board.pos-br { bottom: 0px !important; right: 0px !important; transform-origin: bottom right; }

        .overlay-row { display: flex; border-bottom: 1px solid #000000; height: 28px; box-sizing: border-box; align-items: center; }
        .overlay-row:last-child { border-bottom: none; }
        .overlay-label { 
            width: 55px; background: #ffffff; color: #000000; font-weight: 700; font-size: 11px; 
            border-right: 1px solid #000000; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; height: 100%; text-align: center;
        }
        .overlay-value { 
            flex: 1; color: #000000; font-weight: 500; font-size: 12px; padding: 0 8px;
            display: flex; align-items: center; justify-content: flex-start;
            white-space: nowrap; background: #ffffff; min-width: 0; height: 100%;
            overflow: hidden; text-overflow: ellipsis;
        }

        .bottom-ctrl-box {
            padding: 0 30px 25px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%);
            display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0;
        }
        .shutter-btn {
            width: 105px; height: 105px; background-color: var(--orange); border-radius: 50%;
            border: 7px solid #fff; shadow: 0 10px 30px rgba(255, 140, 0, 0.5);
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .shutter-inner { width: 80px; height: 80px; background: #fff; border-radius: 50%; border: 4px solid #eee; }

        .toast-center {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 600; background: rgba(45, 45, 45, 0.95); color: white; padding: 25px 40px;
            border-radius: 24px; font-weight: 700; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 2px solid var(--orange); animate-in zoom-in duration-300;
        }

        #view-settings { position: absolute; inset: 0; background-color: #f1f5f9; z-index: 500; display: flex; flex-direction: column; }
        .settings-header { padding: 55px 24px 20px; background-color: var(--gunmetal); color: var(--yellow); display: flex; items-center; justify-content: space-between; }

        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 600; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 30px; }
        .modal-content { background: white; border-radius: 0 0 30px 30px; padding: 25px; max-height: 85%; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.7); overflow: hidden; }

        .capturing .capture-hide { display: none !important; }
        
        .gallery-card {
            background: white; border-radius: 20px; padding: 15px; border: 2px solid #f1f5f9; margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .add-menu-container { position: absolute; left: 10px; bottom: 65px; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 550; border: 1px solid #e2e8f0; width: 160px; overflow: hidden; }
        .add-menu-item { width: 100%; text-align: left; padding: 14px 18px; font-weight: 700; font-size: 13px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px; color: #334155; }

        @keyframes marker-boing {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const GOOGLE_CLIENT_ID = '986985952258-hp9bstq1c75d7f1fsuadrmcd0o7fhagj.apps.googleusercontent.com';
        const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

        const getAccessToken = () => new Promise((resolve, reject) => {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE,
                callback: (resp) => resp.error ? reject(resp) : resolve(resp.access_token)
            });
            tokenClient.requestAccessToken({ prompt: '' });
        });

        const getOrCreateFolder = async (token, folderName, parentId = null) => {
            const q = parentId
                ? `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and '${parentId}' in parents and trashed=false`
                : `name='${folderName}' and mimeType='application/vnd.google-apps.folder' and 'root' in parents and trashed=false`;
            const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`, { headers: { Authorization: `Bearer ${token}` } });
            const data = await res.json();
            if (data.files && data.files.length > 0) return data.files[0].id;
            const meta = { name: folderName, mimeType: 'application/vnd.google-apps.folder' };
            if (parentId) meta.parents = [parentId];
            return await fetch('https://www.googleapis.com/drive/v3/files', { method: 'POST', headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(meta) }).then(r => r.json()).then(d => d.id);
        };

        const uploadToDrive = async (token, blob, filename, folderId) => {
            const metadata = { name: filename, parents: [folderId] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
            form.append('file', blob);
            return await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink', { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body: form }).then(r => r.json());
        };

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('main'); 
            const [fields, setFields] = useState([
                { id: 1, label: '공사명', value: '수원 골드스테이션 전기 공사 완료 건', type: 'text', color: '#2D2D2D', quick: ['수원 현장', '동탄 파크뷰', '평택 스마트'], history: ['판교 테크노밸리'], nameRole: 'folder' },
                { id: 2, label: '공 종', value: '전기 설비 공사', type: 'text', color: '#2D2D2D', quick: ['전기 공사', '설비 공사', '소방 공사'], history: ['기초 토목'], nameRole: 'file1' },
                { id: 3, label: '위 치', value: '101동 203호 안방', type: 'text', color: '#2D2D2D', quick: ['101동', '지하 1층', '외부 옹벽'], history: ['전기실 내부'], nameRole: 'file2' },
                { id: 4, label: '날 짜', value: new Date().toISOString().split('T')[0], type: 'date', color: '#2D2D2D', quick: [], history: [], nameRole: null },
                { id: 5, label: '내 용', value: '시공 후', type: 'stage', color: '#FF8C00', quick: ['시공 전', '시공 중', '시공 후'], history: [], nameRole: null }
            ]);

            const [images, setImages] = useState([]);
            const [isPortrait, setIsPortrait] = useState(false);
            const [boardScale, setBoardScale] = useState(0.5); 
            const [boardPos, setBoardPos] = useState('pos-bl');
            const [showModal, setShowModal] = useState(false);
            const [showTemplateModal, setShowTemplateModal] = useState(false);
            const [activeFieldId, setActiveFieldId] = useState(null);
            const [showToast, setShowToast] = useState(false);
            const [toastMsg, setToastMsg] = useState("");
            const [isEditMode, setIsEditMode] = useState(false);
            const [showAddMenu, setShowAddMenu] = useState(false);
            const [user, setUser] = useState(null);
            const [accessToken, setAccessToken] = useState(null);
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState('');
            const [savedImages, setSavedImages] = useState([]);  
            const [isCapturing, setIsCapturing] = useState(false);  
            const [showSavedGallery, setShowSavedGallery] = useState(false);  
            const [roleMenuFieldId, setRoleMenuFieldId] = useState(null);  
            const [aspectRatio, setAspectRatio] = useState('4:3');     
            const [imageQuality, setImageQuality] = useState('normal');

            const fileInputRef = useRef(null);
            const captureContainerRef = useRef(null);  
            const videoRef = useRef(null); 
            const [cameraMode, setCameraMode] = useState(false); 
            const [stream, setStream] = useState(null); 

            const RESOLUTIONS = {
                'normal': { '1:1': [1300,1300], '4:3': [2000,1500], '16:9': [1920,1080] },
                'high':   { '1:1': [2600,2600], '4:3': [4000,3000], '16:9': [3840,2160] }
            };

            const openDB = () => new Promise((res) => {
                const req = indexedDB.open('DriveShootDB', 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore('combinedImages', { keyPath: 'id' });
                req.onsuccess = () => res(req.result);
            });
            const saveToDB = async (blob, filename, folderName, baseName) => {
                const db = await openDB();
                const item = { id: Date.now(), blob, filename, folderName, baseName, createdAt: new Date().toISOString() };
                return new Promise((res) => {
                    const tx = db.transaction('combinedImages', 'readwrite');
                    tx.objectStore('combinedImages').put(item);
                    tx.oncomplete = () => res(item.id);
                });
            };
            const loadAllFromDB = async () => {
                const db = await openDB();
                return new Promise((res) => {
                    const tx = db.transaction('combinedImages', 'readonly');
                    const req = tx.objectStore('combinedImages').getAll();
                    req.onsuccess = () => res(req.result || []);
                });
            };
            const deleteFromDB = async (id) => {
                const db = await openDB();
                return new Promise((res) => {
                    const tx = db.transaction('combinedImages', 'readwrite');
                    tx.objectStore('combinedImages').delete(id);
                    tx.oncomplete = () => res();
                });
            };

            const handleGoogleLogin = () => {
                try {
                    const tokenClient = google.accounts.oauth2.initTokenClient({
                        client_id: GOOGLE_CLIENT_ID, scope: DRIVE_SCOPE + ' https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
                        callback: async (resp) => {
                            if (resp.error) return;
                            setAccessToken(resp.access_token);
                            const res = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: `Bearer ${resp.access_token}` } });
                            const info = await res.json();
                            setUser({ email: info.email, name: info.name, picture: info.picture });
                            setToastMsg(`${info.name}님 환영합니다!`);
                            setShowToast(true); setTimeout(() => setShowToast(false), 2500);
                        }
                    });
                    tokenClient.requestAccessToken({ prompt: 'consent' });
                } catch(e) { setToastMsg("API 준비 중..."); setShowToast(true); setTimeout(() => setShowToast(false), 3000); }
            };

            const handleLogout = () => {
                if (accessToken) google.accounts.oauth2.revoke(accessToken);
                setUser(null); setAccessToken(null);
                setToastMsg("로그아웃 되었습니다."); setShowToast(true); setTimeout(() => setShowToast(false), 2000);
            };

            const handleDriveUpload = async (item) => {
                try {
                    setIsUploading(true); setUploadProgress("전송 중...");
                    const token = await getAccessToken();
                    const rootId = await getOrCreateFolder(token, '드라이브샷');
                    const subId = await getOrCreateFolder(token, item.folderName || '현장사진', rootId);
                    await uploadToDrive(token, item.blob, item.filename, subId);
                    setIsUploading(false); setUploadProgress("");
                    setToastMsg(`✓ 업로드 성공!`); setShowToast(true); setTimeout(() => setShowToast(false), 3000);
                } catch (err) { setIsUploading(false); setUploadProgress(""); setToastMsg("실패"); setShowToast(true); setTimeout(() => setShowToast(false), 3000); }
            };

            const handleUploadAll = async () => {
                if (savedImages.length === 0) return;
                for (const item of savedImages) await handleDriveUpload(item);
            };

            const shareImage = async (blob, filename) => {
                try {
                    const file = new File([blob], filename, { type: blob.type });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ title: '드라이브샷 사진 공유', files: [file] });
                    } else {
                        setToastMsg("공유 미지원 기기"); setShowToast(true); setTimeout(() => setShowToast(false), 2000);
                    }
                } catch (e) { console.error(e); }
            };

            const getNamingInfo = () => {
                const folderField = fields.find(f => f.nameRole === 'folder');
                const file1Field = fields.find(f => f.nameRole === 'file1');
                const file2Field = fields.find(f => f.nameRole === 'file2');
                const dateField = fields.find(f => f.type === 'date');
                const folderName = (folderField?.value || '현장사진').trim();
                const work = (file1Field?.value || '작업').trim().replace(/\s+/g, '');
                const location = (file2Field?.value || '위치').trim();
                const dateValue = (dateField?.value || new Date().toISOString().slice(0,10)).trim();
                const base = `${work}_${location}_${dateValue}`;
                let maxIndex = 0;
                savedImages.forEach(item => {
                    if (item.filename?.startsWith(base + '_')) {
                        const n = parseInt(item.filename.slice(base.length + 1, -4), 10);
                        if (!isNaN(n) && n > maxIndex) maxIndex = n;
                    }
                });
                return { folderName, base, filename: `${base}_${String(maxIndex + 1).padStart(2, '0')}.jpg` };
            };

            const handleFileChange = (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                const url = URL.createObjectURL(files[0]);
                const img = new Image();
                img.onload = () => {
                    setIsPortrait(img.height > img.width);
                    setImages([url]);
                };
                img.src = url;
                e.target.value = ''; 
            };

            const getPreviewRatio = () => {
                const [w, h] = aspectRatio.split(':');
                return (images.length > 0 && isPortrait) ? `${h}/${w}` : `${w}/${h}`;
            };

            /* [핵심 동기화 엔진] 100% WYSIWYG 캡처 로직 */
            const captureAndBake = async (outW, outH, photoSrc) => {
                const imgSrc = photoSrc || images[0];
                const isFromCamera = photoSrc !== undefined;
                if (!imgSrc) throw new Error("사진이 없습니다.");

                let finalOutW = outW;
                let finalOutH = outH;
                if (!isFromCamera && isPortrait) {
                    finalOutW = outH;
                    finalOutH = outW;
                }

                const boardEl = document.querySelector('.overlay-board');
                const originalTransform = boardEl.style.transform;
                boardEl.style.transform = 'none';
                
                const boardCanvas = await html2canvas(boardEl, { 
                    useCORS: true, allowTaint: true, scale: 3, backgroundColor: null, logging: false,
                    onclone: (clonedDoc) => {
                        const rows = clonedDoc.querySelectorAll('.overlay-row');
                        rows.forEach(r => { r.style.display = 'flex'; r.style.alignItems = 'center'; });
                        clonedDoc.querySelectorAll('.overlay-label, .overlay-value').forEach(el => {
                            el.style.paddingBottom = '3px'; // 한글 폰트 수직 정렬 완벽 보정
                        });
                    }
                });
                boardEl.style.transform = originalTransform;

                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = finalOutW; finalCanvas.height = finalOutH;
                const ctx = finalCanvas.getContext('2d');
                const img = new Image(); img.src = imgSrc;
                await new Promise(r => img.onload = r);
                
                const imgRatio = img.width / img.height;
                const outRatio = finalOutW / finalOutH;
                let sw, sh, sx, sy;
                if (imgRatio > outRatio) { sh = img.height; sw = sh * outRatio; sx = (img.width - sw) / 2; sy = 0; }
                else { sw = img.width; sh = sw / outRatio; sx = 0; sy = (img.height - sh) / 2; }
                ctx.drawImage(img, sx, sy, sw, sh, 0, 0, finalOutW, finalOutH);

                // 카메라의 가이드박스 또는 갤러리 프리뷰박스의 실제 Width 값을 참조하여 스케일 계산
                let cw;
                if (isFromCamera) {
                    const ratioMap = {'1:1':[1,1],'4:3':[4,3],'16:9':[16,9]};
                    const [rw,rh] = ratioMap[aspectRatio] || [4,3];
                    const maxW=100, maxH=75; // Safety Box 비율 (CSS와 동일하게 맞춤)
                    let sgW=maxW, sgH=(maxW/rw)*rh;
                    if(sgH>maxH){sgH=maxH; sgW=(maxH/rh)*rw;}
                    // 가로화면(Landscape) 100vh(픽셀값) 대비 세이프박스 폭 계산
                    const screenLandscapeWidth = Math.max(window.innerWidth, window.innerHeight);
                    cw = screenLandscapeWidth * (sgW / 100);
                } else {
                    cw = captureContainerRef.current ? captureContainerRef.current.offsetWidth : boardEl.offsetWidth / boardScale;
                }

                const scaleFactor = finalOutW / cw;
                let finalBoardW = boardEl.offsetWidth * scaleFactor * boardScale;
                let finalBoardH = boardEl.offsetHeight * scaleFactor * boardScale;
                
                let bx = 0, by = 0;
                if (boardPos.includes('l')) bx = 0;
                if (boardPos.includes('r')) bx = finalOutW - finalBoardW;
                if (boardPos.includes('t')) by = 0;
                if (boardPos.includes('b')) by = finalOutH - finalBoardH;

                ctx.drawImage(boardCanvas, 0, 0, boardCanvas.width, boardCanvas.height, bx, by, finalBoardW, finalBoardH);
                return new Promise(res => finalCanvas.toBlob(res, 'image/jpeg', 0.95));
            };

            const triggerApply = async () => {
                if (images.length === 0) return;
                setIsCapturing(true);
                await new Promise(r => setTimeout(r, 100));
                const naming = getNamingInfo();
                const [outW, outH] = RESOLUTIONS[imageQuality][aspectRatio];
                try {
                    const blob = await captureAndBake(outW, outH);
                    await saveToDB(blob, naming.filename, naming.folderName, naming.base);
                    setSavedImages(await loadAllFromDB());
                    setToastMsg("✓ 저장 완료!"); setShowToast(true); setTimeout(() => setShowToast(false), 2500);
                } catch (err) { setToastMsg("실패"); } finally { setIsCapturing(false); }
            };

            const handleShutter = async () => {
                if (cameraMode) {
                    const video = videoRef.current;
                    const vw = video.videoWidth;
                    const vh = video.videoHeight;
                    const canvas = document.createElement('canvas');
                    
                    // 무조건 가로(Landscape) 사진으로 저장하도록 회전
                    if (vh > vw) {
                        canvas.width = vh;
                        canvas.height = vw;
                        const ctx = canvas.getContext('2d');
                        ctx.translate(0, vw);
                        ctx.rotate(-Math.PI / 2);
                        ctx.drawImage(video, 0, 0, vw, vh);
                    } else {
                        canvas.width = vw;
                        canvas.height = vh;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                    }
                    const photoUrl = canvas.toDataURL('image/jpeg', 0.95);
                    stopCamera(); 
                    setIsPortrait(false); // 카메라는 항상 가로

            const stopCamera = () => { if (stream) stream.getTracks().forEach(t => t.stop()); setStream(null); setCameraMode(false); };
            
            const updateFieldValue = (id, val) => {

            const loadTemplate = (t) => { setFields(JSON.parse(JSON.stringify(t.fields))); setBoardScale(t.scale); setBoardPos(t.pos); setShowTemplateModal(false); };

                    {cameraMode && (
                        <div style={{

                                    {isEditMode && <div className="del-btn" onClick={(e)=>{e.stopPropagation(); setFields(fields.filter(fd=>fd.id!==f.id))}}><i className="fa-solid fa-xmark"></i></div>}

                        </div>

                        <div className="smart-toolbar relative">

                            </button>
                        </div>
                    </div>

                    {showTemplateModal && (
                        <div className="modal-overlay" onClick={() => setShowTemplateModal(false)}>

                                <h3 className="font-black text-lg mb-6 uppercase text-slate-800 tracking-tighter">{currentField.label} Select</h3>
                                <div className="flex flex-wrap gap-2 mb-8">
                                    {currentField.quick.map((v, i) => <button key={i} onClick={() => updateFieldValue(activeFieldId, v)} className="bg-slate-50 border-2 border-slate-100 px-4 py-3 rounded-xl text-sm font-bold text-slate-600 active:border-[#FF8C00]">{v}</button>)}
                                </div>
                                <input type="text" className="w-full p-5 bg-slate-50 border-2 border-orange-100 rounded-2xl font-bold outline-none focus:border-[#FF8C00] text-lg shadow-inner" placeholder="내용 입력..." onKeyDown={(e) => e.key==='Enter' && updateFieldValue(activeFieldId, e.target.value)} />
                            </div>
                        </div>
                    )}

                    {showToast && (
                        <div className="toast-center">
                            <div className="flex flex-col items-center gap-4">
                                <div className="w-16 h-16 bg-[#FFD700]/20 rounded-full flex items-center justify-center border border-yellow-500/20 shadow-inner"><i className="fa-solid fa-check text-4xl text-[#FFD700]"></i></div>
                                <p className="text-xl font-bold text-white uppercase">{toastMsg}</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
